description: ModivCare Inc. is a technology-enabled healthcare services company that provides a suite of integrated supportive care solutions for public and private payors and their members. The company offers non-emergency medical transportation (NEMT), personal care services, and remote patient monitoring to address social determinants of health. ModivCare partners with healthcare plans, government agencies, and providers to improve access to care for vulnerable populations.
